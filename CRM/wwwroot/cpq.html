<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHEET CONFIGURATOR</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 40px; line-height: 1.6; }
    h1 { color: #d32f2f; text-align: center; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    label { display: block; font-weight: bold; margin: 15px 0 5px; font-size: 18px; }
    select { width: 100%; padding: 14px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; background: #fff; }
    #status { margin-top: 30px; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; background: #e9ecef; }
    #preview { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 18px; text-align: center; background: #d4edda; color: #155724; }
    .action-button { margin-top: 20px; padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
    #insert-button { background: #007bff; color: white; }
    #create-button { background: #28a745; color: white; }
    #create-button:disabled { background: #6c757d; cursor: not-allowed; }
    #reset-button { margin-top: 10px; padding: 12px 24px; font-size: 16px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .button-container { text-align: center; }
    .copy-btn { margin-left: 15px; padding: 6px 12px; font-size: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SHEET CONFIGURATOR</h1>

    <label>MATERIAL</label>
    <select id="attr1"><option>Načítám...</option></select>

    <label>APPLICATION</label>
    <select id="attr2"><option>Načítám...</option></select>

    <label>PRODUCT_TYPE</label>
    <select id="attr3"><option>Načítám...</option></select>

    <label>THICKNESS</label>
    <select id="attr4"><option>Načítám...</option></select>

    <label>DIMENSION</label>
    <select id="attr5"><option>Načítám...</option></select>

    <label>SPECIAL_INS</label>
    <select id="attr6"><option>Načítám...</option></select>

    <label>EMPTY (nepovinné)</label>
    <select id="attr7"><option>Načítám...</option></select>

    <div id="preview">DESCRIPTION: Vyberte atributy</div>
    <div id="status">Status: WAITING FOR UPLOAD...</div>

    <div class="button-container">
      <button id="insert-button" class="action-button" style="display:none;"></button>
      <button id="create-button" class="action-button" style="display:none;">ADD NEW ITEM INTO POHODA</button>
      <button id="reset-button">NEW CONFIGURATION</button>
    </div>
  </div>

  <script>
    let API_BASE = '';
    const selected = {};

    function status(msg) {
      document.getElementById('status').innerHTML = 'STATUS: ' + msg;
      console.log(msg);
    }

    function updatePreview() {
      const parts = [];

      // 1. PE
      parts.push("PE");

      // 2. APPLICATION (attr2) → Eco_Star, Eco_Star atd.
      if (selected[2] && selected[2].trim() && selected[2] !== "-- choose value --") {
        const app = selected[2].trim().replace(/\s+/g, "_");
        parts.push(app);
      }

      // 3. PRODUCT_TYPE (attr3) → BICOLOR, MONOCOLOR atd.
      if (selected[3] && selected[3].trim() && selected[3] !== "-- Choose value --") {
        parts.push(selected[3].trim().toUpperCase());
      }

      // 4. THICKNESS (attr4) → 10, 12,7 atd.
      if (selected[4] && selected[4].trim() && selected[4] !== "-- Choose value --") {
        const thick = selected[4].trim().replace(".", ",");
        parts.push(thick);
      }

      // 5. DIMENSION (attr5) → 1160-1000, 1080-3020 atd.
      if (selected[5] && selected[5].trim() && selected[5] !== "-- Choose value --") {
        parts.push(selected[5].trim());
      }

      // 6. SPECIAL_INS (attr6) → <MQO, embossed, <100 ks atd.
      if (selected[6] && selected[6].trim() && selected[6] !== "-- Choose value --") {
        parts.push(selected[6].trim());
      }

      const name = parts.join(" ").trim();

      if (parts.length >= 4) {
        document.getElementById('preview').textContent = 'PREVIEW: ' + name;
        document.getElementById('preview').style.background = '#d4edda';
        document.getElementById('preview').style.color = '#155724';
      } else {
        document.getElementById('preview').textContent = 'PREVIEW: APPLICATION, PRODUCT_TYPE, THICKNESS a DIMENSION';
        document.getElementById('preview').style.background = '#fff3cd';
        document.getElementById('preview').style.color = '#856404';
      }

      document.getElementById('insert-button').style.display = 'none';
      document.getElementById('create-button').style.display = 'none';
    }

    function populateSelect(id, values) {
      const select = document.getElementById(id);
      const current = select.value;

      select.innerHTML = '<option value="">-- Choose value --</option>';
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        if (v === current) opt.selected = true;
        select.appendChild(opt);
      });
    }

    async function loadInitial() {
      const cfg = await fetch('/api/config').then(r => r.json());
      API_BASE = cfg.apiBase;

      status('Načítám atributy...');
      for (let i = 1; i <= 7; i++) {
        try {
          const res = await fetch(`${API_BASE}/CpqAttrValues${i}`);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const text = await res.text();
          const values = text.trim().split('\n').map(l => l.trim()).filter(l => l);
          populateSelect(`attr${i}`, values);
        } catch (e) {
          status('LOADING MISTAKE ' + i);
          console.error(e);
        }
      }
      status('ATTRIBUTES LOADED – CHOOSE VALUE');
      updatePreview();

      for (let i = 1; i <= 7; i++) {
        document.getElementById(`attr${i}`).onchange = () => updateFilter(i);
      }

      document.getElementById('reset-button').onclick = () => {
        for (let i = 1; i <= 7; i++) {
          document.getElementById(`attr${i}`).value = '';
        }
        Object.keys(selected).forEach(k => delete selected[k]);
        updatePreview();
        status('Formulář vyčištěn – začněte novou konfiguraci');
      };
    }

    async function updateFilter(changedAttr) {
      const select = document.getElementById(`attr${changedAttr}`);
      const value = select.value.trim();

      status(`Vybráno v atributu ${changedAttr}: ${value || 'prázdné'}`);

      if (value) selected[changedAttr] = value;
      else delete selected[changedAttr];

      const params = new URLSearchParams();
      Object.keys(selected).forEach(k => params.append(`attr${k}`, selected[k]));

      try {
        const res = await fetch(`${API_BASE}/CpqFilterValues?${params}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        status('Filter vrácen – aktualizuji dropdowny');

        for (let i = 1; i <= 7; i++) {
          if (i === changedAttr) continue;
          const values = data[i] || [];
          populateSelect(`attr${i}`, values);
        }

        if (Object.keys(selected).length === 7) {
          try {
            const checkRes = await fetch(`${API_BASE}/CpqItemPohodaCheck?${params}`);
            const checkData = await checkRes.json();

            if (checkData.exists) {
              document.getElementById('status').innerHTML = checkData.message + 
                '<br><button id="insert-button-temp" style="margin-top:15px; padding:15px 30px; font-size:18px; background:#007bff; color:white; border:none; border-radius:8px; cursor:pointer;">ADD AS QUOTE ITEM</button>';

              document.getElementById('insert-button-temp').onclick = () => {
                sendToParentIfInIframe(checkData.code);
              };
            } else {
              document.getElementById('status').innerHTML = checkData.message + 
                '<br><button id="create-button-temp" style="margin-top:15px; padding:15px 30px; font-size:18px; background:#28a745; color:white; border:none; border-radius:8px; cursor:pointer;">CREATE NEW ITEM IN POHODA</button>';

              document.getElementById('create-button-temp').onclick = async () => {
                const button = document.getElementById('create-button-temp');
                button.disabled = true;
                button.textContent = 'WORKING ON IT';

                try {
                  const codeRes = await fetch(`${API_BASE}/CpqNextCode`);
                  if (!codeRes.ok) throw new Error('Chyba při získávání kódu');
                  const codeData = await codeRes.json();

                  let parametersXml = '';

                  // Vždy přidáme RefVPrStockCat jako první parametr
                  parametersXml += `
  <typ:parameter>
    <typ:name>RefVPrStockCat</typ:name>
    <typ:listValueRef>
      <typ:ids>SHEET PE</typ:ids>
    </typ:listValueRef>
    <typ:list>
      <typ:ids>StockCat</typ:ids>
    </typ:list>
  </typ:parameter>`;

                  // Pak přidáme všechny VPrAttr1 až VPrAttr7 (pokud mají hodnotu)
                  for (let i = 1; i <= 7; i++) {
                    if (selected[i]) {
                      const safeValue = selected[i]
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&apos;");

                      parametersXml += `
  <typ:parameter>
    <typ:name>VPrAttr${i}</typ:name>
    <typ:textValue>${safeValue}</typ:textValue>
  </typ:parameter>`;
                    }
                  }

                  parametersXml = parametersXml ? `<stk:parameters>${parametersXml}</stk:parameters>` : '';

                  // Generování názvu karty
                  let nameParts = ["PE"];
                  if (selected[2]) nameParts.push(selected[2].trim().replace(/\s+/g, "_"));
                  if (selected[3]) nameParts.push(selected[3].trim().toUpperCase());
                  if (selected[4]) nameParts.push(selected[4].trim().replace(".", ","));
                  if (selected[5]) nameParts.push(selected[5].trim());
                  if (selected[6]) nameParts.push(selected[6].trim());

                  const cardName = nameParts.join(" ").trim();

                  const xml = `<?xml version="1.0" encoding="Windows-1250"?>
<dat:dataPack xmlns:dat="http://www.stormware.cz/schema/version_2/data.xsd"
              xmlns:stk="http://www.stormware.cz/schema/version_2/stock.xsd"
              xmlns:typ="http://www.stormware.cz/schema/version_2/type.xsd"
              version="2.0"
              id="CPQ01"
              ico="05307970"
              application="HDPE CPQ 2026"
              note="Automaticky vytvořeno">
  <dat:dataPackItem version="2.0" id="${codeData.code}" actionType="add">
    <stk:stock version="2.1">
      <stk:stockHeader>
        <stk:stockType>card</stk:stockType>
        <stk:code>${codeData.code}</stk:code>
        <stk:name>${cardName}</stk:name>
        <stk:unit>ks</stk:unit>
        <stk:storage><typ:ids>02 OUT</typ:ids></stk:storage>
        <stk:typePrice><typ:ids>SK</typ:ids></stk:typePrice>
        <stk:purchasingRateVAT>high</stk:purchasingRateVAT>
        <stk:sellingRateVAT>high</stk:sellingRateVAT>
        <stk:isSales>true</stk:isSales>
        <stk:description>
Konfigurátor HDPE desek:
MATERIAL:      ${selected[1] || '-'}
APPLICATION:   ${selected[2] || '-'}
PRODUCT_TYPE:  ${selected[3] || '-'}
THICKNESS:     ${selected[4] || '-'} mm
DIMENSION:     ${selected[5] || '-'}
SPECIAL_INS:   ${selected[6] || '-'}
EMPTY:         ${selected[7] || '-'}
        </stk:description>
        ${parametersXml}
      </stk:stockHeader>
    </stk:stock>
  </dat:dataPackItem>
</dat:dataPack>`;

                  const controller = new AbortController();
                  const timeoutId = setTimeout(() => controller.abort(), 120000);

                  const proxyRes = await fetch(`${API_BASE}/CpqItemCreationPohoda`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/xml',
                      'User-Agent': 'HDPE CPQ 2026',
                      'Accept': 'application/xml',
                      'Accept-Encoding': 'gzip, deflate'
                    },
                    body: xml,
                    signal: controller.signal
                  });

                  clearTimeout(timeoutId);

                  if (proxyRes.status === 200) {
                    document.getElementById('status').innerHTML = `✓ NEW ITEM WAS CREATED! ITEM: <strong>${codeData.code}</strong> 
                      <button class="copy-btn" onclick="navigator.clipboard.writeText('${codeData.code}').then(()=>alert('Kód ${codeData.code} zkopírován!'))"></button>`;
                    button.textContent = 'Hotovo!';
                    button.style.background = '#17a2b8';
                    button.disabled = true;
                    document.getElementById('reset-button').style.display = 'inline-block';

                    sendToParentIfInIframe(codeData.code);
                  } else {
                    document.getElementById('status').innerHTML = `❌ Chyba při vytváření (HTTP ${proxyRes.status})`;
                    button.disabled = false;
                    button.textContent = 'Zkusit znovu';
                  }
                } catch (e) {
                  if (e.name === 'AbortError') {
                    document.getElementById('status').innerHTML = '❌ Timeout – operace trvala příliš dlouho.';
                  } else {
                    document.getElementById('status').innerHTML = '❌ Chyba komunikace s backendem';
                    console.error(e);
                  }
                  button.disabled = false;
                  button.textContent = 'Zkusit znovu';
                }
              };
            }
          } catch (e) {
            status('Chyba při ověřování existence');
            console.error(e);
          }
        } else {
          status('ALL ATTRIBUES ARE NEEDED');
        }

        updatePreview();

      } catch (e) {
        status('Chyba při filtrování');
        console.error(e);
      }
    }

    function sendToParentIfInIframe(cardCode) {
      if (window.parent !== window && Object.keys(selected).length >= 1) {
        const configToSend = {
          type: 'cpq-complete',
          config: {
            attr1: selected[1] || '',
            attr2: selected[2] || '',
            attr3: selected[3] || '',
            attr4: selected[4] || '',
            attr5: selected[5] || '',
            attr6: selected[6] || '',
            attr7: selected[7] || '',
            code: cardCode || 'NOVÁ'
          }
        };

        console.log('Odesílám data do CRM:', configToSend);
        window.parent.postMessage(configToSend, '*');

        setTimeout(() => {
          if (window.parent.closeCPQModal) window.parent.closeCPQModal();
        }, 300);
      }
    }

    window.onload = loadInitial;
  </script>
</body>
</html>
