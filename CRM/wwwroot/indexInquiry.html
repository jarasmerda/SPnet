<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHEET Inquiries</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 40px; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #d32f2f; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background: #f8f9fa; }
    .btn { padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 0 10px 20px 0; }
    .status-roz { color: #007bff; font-weight: bold; }
    .status-cek { color: #ffc107; font-weight: bold; }
    .status-sch { color: #28a745; font-weight: bold; }
    .filters { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; min-width: 220px; }
    .filter-group label { margin-bottom: 6px; font-weight: bold; }
    select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SHEET Inquiries</h1>

    <!-- ODKAZ NA OFFER GENERATOR -->
    <div style="text-align:center; margin-bottom:12px;">
      <a href="/order.html"
         target="_blank"
         style="
           display:inline-block;
           font-size:16px;
           font-weight:bold;
           color:#007bff;
           text-decoration:none;
         ">
        → OFFER GENERATOR (from Inquiry)
      </a>
    </div>
    
    <button class="btn" onclick="newInquiry()">+ NEW Inquiry</button>

    <h2>Inquiry LIST</h2>

    <div class="filters">
      <div class="filter-group">
        <label for="filterStatus">Stav</label>
        <select id="filterStatus" onchange="updateFilters()">
          <option value="">ALL STATUSES</option>
          <option value="Rozpracovaná">WORKING ON IT</option>
          <option value="Čeká na schválení">WAITING FOR APPROVAL</option>
          <option value="Schválená">APPROVED</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filterCustomer">CUSTOMER</label>
        <select id="filterCustomer" onchange="updateFilters()">
          <option value="">ALL CUSTOMERS</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filterNumber">Inquiry #</label>
        <select id="filterNumber" onchange="updateFilters()">
          <option value="">ALL Inquiries</option>
        </select>
      </div>

      <div class="filter-group">
        <button class="btn" style="background:#dc3545;" onclick="resetFilters()">FILTER RESET</button>
      </div>
    </div>

    <table id="InquiriesTable">
      <thead>
        <tr>
          <th>Inquiry #</th>
          <th>STATUS</th>
          <th>CUSTOMER</th>
          <th>CREATED</th>
          <th>LAST CHANGE</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let API = '';
    let allInquiries = [];

    async function loadInquiries() {
      try {
        const res = await fetch(`${API}/IndexInquiriesList`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allInquiries = await res.json();
        resetFilters(); // inicializace + první vykreslení
      } catch (e) {
        console.error(e);
        document.querySelector('#InquiriesTable tbody').innerHTML = 
          '<tr><td colspan="6" style="text-align:center; color:#dc3545;">Chyba při načítání nabídek</td></tr>';
      }
    }

    function getFilteredInquiries() {
      const stat = document.getElementById('filterStatus').value;
      const cust = document.getElementById('filterCustomer').value;
      const num  = document.getElementById('filterNumber').value;

      return allInquiries.filter(q => {
        const status   = q.status || 'Rozpracovaná';
        const customer = q.customerName || '';
        const InquiryNum = q.InquiryNumber || '';

        return (!stat || status === stat) &&
               (!cust || customer === cust) &&
               (!num  || InquiryNum === num);
      });
    }

    function updateFilters() {
      const filtered = getFilteredInquiries();

      // 1. Aktualizujeme tabulku
      renderTable(filtered);

      // 2. Aktualizujeme dropdowny podle aktuálně filtrovaných nabídek
      updateCustomerDropdown(filtered);
      updateNumberDropdown(filtered);
    }

    function updateCustomerDropdown(currentFiltered) {
      const select = document.getElementById('filterCustomer');
      const currentValue = select.value;

      // Uložíme si aktuálně vybranou hodnotu, abychom ji po překreslení zachovali (pokud stále existuje)
      select.innerHTML = '<option value="">ALL CUSTOMERS</option>';

      const customers = [...new Set(
        currentFiltered.map(q => q.customerName).filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, 'cs'));

      customers.forEach(cust => {
        const opt = document.createElement('option');
        opt.value = cust;
        opt.textContent = cust;
        if (cust === currentValue) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function updateNumberDropdown(currentFiltered) {
      const select = document.getElementById('filterNumber');
      const currentValue = select.value;

      select.innerHTML = '<option value="">ALL Inquiries</option>';

      const numbers = [...new Set(
        currentFiltered.map(q => q.InquiryNumber).filter(Boolean)
      )].sort();

      numbers.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        if (n === currentValue) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function renderTable(Inquiries) {
      const tbody = document.querySelector('#InquiriesTable tbody');
      tbody.innerHTML = '';

      if (Inquiries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Žádné nabídky</td></tr>';
        return;
      }

      Inquiries.forEach(q => {
        const tr = document.createElement('tr');
        let statusClass = 'status-roz';
        const status = q.status || 'Rozpracovaná';

        if (status === 'Čeká na schválení') statusClass = 'status-cek';
        if (status === 'Schválená') statusClass = 'status-sch';

        tr.innerHTML = `
          <td><a href="Inquiry.html?Inquiry=${q.InquiryNumber}">${q.InquiryNumber || '—'}</a></td>
          <td class="${statusClass}">${status}</td>
          <td>${q.customerName || '—'}</td>
          <td>${q.created || '—'}</td>
          <td>${q.lastSaved || '—'}</td>
          <td><button onclick="openInquiry('${q.InquiryNumber}')">Otevřít</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function resetFilters() {
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterCustomer').value = '';
      document.getElementById('filterNumber').value = '';

      const all = allInquiries.slice(); // kopie
      renderTable(all);
      updateCustomerDropdown(all);
      updateNumberDropdown(all);
    }

    async function newInquiry() {
      try {
        const res = await fetch(`${API}/next-Quote`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        location.href = `Inquiry.html?Inquiry=${data.InquiryNumber}`;
      } catch (e) {
        alert('Chyba při generování nového čísla nabídky');
      }
    }

    function openInquiry(number) {
      location.href = `Inquiry.html?Inquiry=${number}`;
    }

    // Spuštění
    (async () => {
      const cfg = await fetch('/api/config').then(r => r.json());
      API = cfg.apiBase;
      loadInquiries();
    })();
  </script>
</body>
</html>
