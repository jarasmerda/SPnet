<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFER GENERATOR</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      color: #333;
    }

    h1 {
      color: #d32f2f;
      text-align: center;
      margin: 20px 0 30px;
      font-size: 2.4rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    label {
      font-weight: bold;
      display: block;
      margin: 12px 0 6px;
      color: #444;
    }

    input {
      width: 100%;
      max-width: 380px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    input[readonly] {
      background: #f8f9fa;
      color: #555;
      font-weight: 500;
    }

    button {
      padding: 5px 6px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      box-sizing: border-box;
      margin: 2px 0;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .primary-btn {
      background: #d32f2f;
      color: white;
    }

    .duplicate-btn {
      background: #fd7e14;
      color: white;
    }

    .remove-btn {
      background: #dc3545;
      color: white;
    }

    .order-btn {
      display: block;
      margin: 40px auto 20px;
      background: #ff5722;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 16px 40px;
      min-width: 340px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(255,87,34,0.3);
    }

    .order-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      color: #dc3545;
      background: #fff5f5;
      border: 1px solid #f5c6cb;
      padding: 14px 18px;
      border-radius: 8px;
      margin: 16px 0;
      font-weight: 500;
    }

    .small { font-size: 11px; color: #666; line-height: 1.2; }

    .ok { color: #28a745; font-weight: bold; }

    .table-wrapper {
      overflow-x: auto;
      margin: 20px 0 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      min-width: 1000px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #e0e0e0;
      padding: 8px 6px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f1f3f5;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      padding: 8px 6px;
    }

    td {
      white-space: normal;
      word-wrap: break-word;
    }

    tr:hover {
      background: #f8f9fa;
    }

    td.pohoda-col,
    td.action-col {
      padding: 4px 3px !important;
      min-width: 110px !important;
      max-width: 130px !important;
      text-align: center;
      white-space: nowrap;
    }

    .pohoda-buttons,
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: stretch;
    }

    .pohoda-buttons button,
    .action-buttons button {
      margin: 0 !important;
      padding: 4px 6px !important;
      font-size: 11px !important;
      line-height: 1.1;
      width: 100%;
      box-sizing: border-box;
    }

    .pohoda-buttons button {
      background: #007bff;
      color: white;
      font-weight: 600;
    }

    td:nth-child(2) { min-width: 0px; }   /* Code */
    td:nth-child(3) { min-width: 120px; }   /* Attr8 */
    td:nth-child(4) { min-width: 120px; }   /* Attr9 */
    td:nth-child(5) { min-width: 0px; }   /* Attributes */
    td:nth-child(6) { min-width:  0px; text-align: center; }  /* Qty */
    td:nth-child(7) { min-width: 0px; text-align: right; }   /* Cost */
    td:nth-child(8) { min-width: 0px; text-align: right; }   /* Price */

    select {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .attr-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
    }

    .attr-item {
      background: #f8f9fa;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid #eee;
    }

    .attr-item:empty {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>OFFER GENERATOR</h1>

    <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 30px;">
      <div style="flex: 1 1 300px;">
        <label>Quote number</label>
        <input id="quoteNumber" placeholder="např. Q260002">
      </div>
      <div style="align-self: flex-end;">
        <button class="primary-btn" onclick="loadQuote()">GET DETAILS</button>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px;">
      <div>
        <label>Status</label>
        <input id="status" readonly>
      </div>
      <div>
        <label>Customer</label>
        <input id="customerName" readonly>
      </div>
      <div>
        <label>Date</label>
        <input id="date" readonly>
      </div>
      <div>
        <label>Valid until</label>
        <input id="validUntil" readonly>
      </div>
    </div>

    <h2>Items</h2>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width: 50px;">ITEM</th>   <!-- ← zde fixní šířka v pixelech -->
            <th>Code</th>
            <th>Attr8</th>
            <th>Attr9</th>
            <th>Attributes</th>
            <th>Qty</th>
            <th>Cost</th>
            <th>Price</th>
            <th style="width: 10px;">ACTION</th>   <!-- ← zde fixní šířka v pixelech -->
          </tr>
        </thead>
        <tbody id="items"></tbody>
      </table>
    </div>

    <div id="error" class="error"></div>

    <div style="text-align: center;">
      <button class="order-btn" onclick="createPohodaOrder()">
        VYTVOŘIT PRODEJNÍ OBJEDNÁVKU V POHODĚ
      </button>
    </div>

  </div>

<script>
const API_BASE = '';

let availableQuotes = [];
let attr8Values = [];
let attr9Values = [];

window._quoteItems = [];

function getQuoteFromInput() {
  return document.getElementById('quoteNumber').value.trim();
}

function escapeHtml(str) {
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function xmlEscape(str) {
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&apos;');
}

async function loadAvailableQuotes(silent = false) {
  try {
    const res = await fetch(`${API_BASE}/IndexQuotesList`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    availableQuotes = await res.json();
    availableQuotes.sort((a, b) => b.quoteNumber.localeCompare(a.quoteNumber));
  } catch (err) {
    if (!silent) {
      document.getElementById('error').textContent = 'Nepodařilo se načíst seznam nabídek: ' + err.message;
    }
    console.error(err);
  }
}

async function quoteExists(number) {
  if (availableQuotes.length === 0) {
    await loadAvailableQuotes(true);
  }
  return availableQuotes.some(q => q.quoteNumber === number);
}

async function loadAttrValues(n) {
  try {
    const res = await fetch(`${API_BASE}/CpqAttrValues${n}`, { headers: { 'Accept': 'text/plain' } });
    if (!res.ok) throw new Error(`attr${n} HTTP ${res.status}`);
    const text = await res.text();
    return text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  } catch (e) {
    console.warn(`Načítání Attr${n} selhalo:`, e.message);
    return [];
  }
}

async function ensureAttrLoaded() {
  if (attr8Values.length === 0) attr8Values = await loadAttrValues(8);
  if (attr9Values.length === 0) attr9Values = await loadAttrValues(9);
}

function buildSelect(values, selected, onChangeJs) {
  const opts =
    `<option value="">—</option>` +
    values.map(v => `<option value="${escapeHtml(v)}" ${v === selected ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('');
  return `<select onchange="${onChangeJs}">${opts}</select>`;
}

function onAttrChange(index, attrNum, value) {
  const it = window._quoteItems?.[index];
  if (!it) return;

  if (attrNum === 8) it.attr8 = value;
  if (attrNum === 9) it.attr9 = value;

  const out = document.getElementById(`pohoda-result-${index}`);
  if (out) out.textContent = '';
}

async function findIdsByAttrs(itemId, attr8, attr9) {
  const res = await fetch(`${API_BASE}/OrdersFindIdsByAttrsPohoda`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ itemId, attr8, attr9 })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(`HTTP ${res.status}: ${text}`);
  }
  return await res.json();
}

async function getNextVariantCode(baseCode) {
  const res = await fetch(`${API_BASE}/OfferNextItemCodePohoda?baseCode=${encodeURIComponent(baseCode)}`, {
    headers: { 'Accept': 'application/json' }
  });
  if (!res.ok) throw new Error(`next-variant-code HTTP ${res.status}: ${await res.text()}`);
  return await res.json();
}

function buildCardName(attrs) {
  const parts = ["PE"];
  if (attrs.attr2) parts.push(String(attrs.attr2).trim().replace(/\s+/g, "_"));
  if (attrs.attr3) parts.push(String(attrs.attr3).trim().toUpperCase());
  if (attrs.attr4) parts.push(String(attrs.attr4).trim().replace(".", ","));
  if (attrs.attr5) parts.push(String(attrs.attr5).trim());
  if (attrs.attr6) parts.push(String(attrs.attr6).trim());
  if (attrs.attr8) parts.push(String(attrs.attr8).trim());
  if (attrs.attr9) parts.push(String(attrs.attr9).trim());
  return parts.join(" ").trim();
}

function buildPohodaXml(newCode, cardName, attrs) {
  let parametersXml = `
  <typ:parameter>
    <typ:name>RefVPrStockCat</typ:name>
    <typ:listValueRef><typ:ids>SHEET PE</typ:ids></typ:listValueRef>
    <typ:list><typ:ids>StockCat</typ:ids></typ:list>
  </typ:parameter>`;

  for (let i = 1; i <= 9; i++) {
    const v = attrs[`attr${i}`];
    if (v && String(v).trim()) {
      parametersXml += `
  <typ:parameter>
    <typ:name>VPrAttr${i}</typ:name>
    <typ:textValue>${xmlEscape(v)}</typ:textValue>
  </typ:parameter>`;
    }
  }

  const parametersBlock = `<stk:parameters>${parametersXml}</stk:parameters>`;

  const description = xmlEscape(
`Konfigurátor HDPE desek:
ATTR1: ${attrs.attr1 || '-'}
ATTR2: ${attrs.attr2 || '-'}
ATTR3: ${attrs.attr3 || '-'}
ATTR4: ${attrs.attr4 || '-'}
ATTR5: ${attrs.attr5 || '-'}
ATTR6: ${attrs.attr6 || '-'}
ATTR7: ${attrs.attr7 || '-'}
ATTR8: ${attrs.attr8 || '-'}
ATTR9: ${attrs.attr9 || '-'}`);

  return `<?xml version="1.0" encoding="Windows-1250"?>
<dat:dataPack xmlns:dat="http://www.stormware.cz/schema/version_2/data.xsd"
              xmlns:stk="http://www.stormware.cz/schema/version_2/stock.xsd"
              xmlns:typ="http://www.stormware.cz/schema/version_2/type.xsd"
              version="2.0"
              id="CRM01"
              ico="05307970"
              application="HDPE CRM 2026"
              note="Automaticky vytvořeno">
  <dat:dataPackItem version="2.0" id="${xmlEscape(newCode)}" actionType="add">
    <stk:stock version="2.1">
      <stk:stockHeader>
        <stk:stockType>card</stk:stockType>
        <stk:code>${xmlEscape(newCode)}</stk:code>
        <stk:name>${xmlEscape(cardName)}</stk:name>
        <stk:unit>ks</stk:unit>
        <stk:storage><typ:ids>02 OUT</typ:ids></stk:storage>
        <stk:typePrice><typ:ids>SK</typ:ids></stk:typePrice>
        <stk:purchasingRateVAT>high</stk:purchasingRateVAT>
        <stk:sellingRateVAT>high</stk:sellingRateVAT>
        <stk:isSales>true</stk:isSales>
        <stk:description>${description}</stk:description>
        ${parametersBlock}
      </stk:stockHeader>
    </stk:stock>
  </dat:dataPackItem>
</dat:dataPack>`;
}

async function createPohodaCard(xml) {
  const res = await fetch(`${API_BASE}/CpqItemCreationPohoda`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/xml',
      'Accept': 'application/xml'
    },
    body: xml
  });

  if (!res.ok) {
    const t = await res.text();
    throw new Error(`create-pohoda HTTP ${res.status}: ${t}`);
  }
  return await res.text();
}

async function onCheckPohoda(index) {
  const it = window._quoteItems?.[index];
  if (!it) return;

  const out = document.getElementById(`pohoda-result-${index}`);
  out.textContent = 'kontrola...';

  if (it._createdCode) {
    out.innerHTML = `<span class="ok">VYTVORENO:</span> ${escapeHtml(it._createdCode)}`;
    return;
  }

  const itemId = it.itemId;
  const attr8 = (it.attr8 || '').trim();
  const attr9 = (it.attr9 || '').trim();

  if (!itemId) { out.textContent = 'chybí itemId'; return; }
  if (!attr8 || !attr9) { out.textContent = 'vyberte Attr8 + Attr9'; return; }

  try {
    const r = await findIdsByAttrs(itemId, attr8, attr9);

    if (r.ids && r.ids.trim()) {
      out.innerHTML = `<span class="ok">NAŠLO SE:</span> ${escapeHtml(r.ids)}`;
    } else {
      out.innerHTML = `<button onclick="onAddNewItem(${index})">VYTVOŘIT NOVOU KARTU</button>`;
    }
  } catch (e) {
    console.error(e);
    out.textContent = 'chyba';
  }
}

async function onAddNewItem(index) {
  const it = window._quoteItems?.[index];
  if (!it) return;

  const out = document.getElementById(`pohoda-result-${index}`);
  out.textContent = 'vytvářím...';

  const rawCode = (it.code || '').trim();
  const baseCode = rawCode.includes('-') ? rawCode.split('-')[0].trim() : rawCode;

  const a8 = (it.attr8 || '').trim();
  const a9 = (it.attr9 || '').trim();

  if (!baseCode) { out.textContent = 'chybí Code'; return; }
  if (!a8 || !a9) { out.textContent = 'vyberte Attr8 + Attr9'; return; }

  const attrs = {
    attr1: it.attributes?.attr1 || '',
    attr2: it.attributes?.attr2 || '',
    attr3: it.attributes?.attr3 || '',
    attr4: it.attributes?.attr4 || '',
    attr5: it.attributes?.attr5 || '',
    attr6: it.attributes?.attr6 || '',
    attr7: it.attributes?.attr7 || '',
    attr8: a8,
    attr9: a9
  };

  try {
    const next = await getNextVariantCode(baseCode);
    const newCode = next.code;

    const cardName = buildCardName(attrs);
    const xml = buildPohodaXml(newCode, cardName, attrs);

    await createPohodaCard(xml);

    it._createdCode = newCode;
    out.innerHTML = `<span class="ok">VYTVORENO:</span> ${escapeHtml(newCode)}`;

  } catch (e) {
    console.error(e);
    out.textContent = 'chyba';
  }
}

async function loadQuote() {
  const number = getQuoteFromInput();
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';

  if (!number) {
    errorEl.textContent = 'Zadejte číslo nabídky';
    return;
  }

  const exists = await quoteExists(number);
  if (!exists) {
    errorEl.textContent = `Nabídka ${number} nebyla nalezena v seznamu existujících nabídek`;
    return;
  }

  await ensureAttrLoaded();

  try {
    const res = await fetch(`${API_BASE}/quote/${encodeURIComponent(number)}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const q = await res.json();

    document.getElementById('quoteNumber').value = q.quoteNumber || number;
    document.getElementById('status').value = q.status || '';
    document.getElementById('customerName').value = q.customerName || '';
    document.getElementById('date').value = q.date || '';
    document.getElementById('validUntil').value = q.validUntil || '';

    const tbody = document.getElementById('items');
    tbody.innerHTML = '';

    window._quoteItems = (q.items || []).map(it => ({
      ...it,
      attr8: it.attr8 || '',
      attr9: it.attr9 || '',
      _createdCode: it._createdCode || '',
      quantity: it.quantity || 1
    }));

    window._quoteItems.forEach((i, index) => {
      let attrHtml = '<div class="attr-list">';
      for (let n = 1; n <= 7; n++) {
        const val = i.attributes?.[`attr${n}`];
        if (val) {
          attrHtml += `<div class="attr-item">Attr${n}: ${escapeHtml(val)}</div>`;
        }
      }
      attrHtml += '</div>';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="pohoda-col">
          <div class="pohoda-buttons">
            <button onclick="onCheckPohoda(${index})">CHECK</button>
            <span id="pohoda-result-${index}" class="small" style="margin-top:3px;"></span>
          </div>
        </td>
        <td>${escapeHtml(i.code ?? '')}</td>
        <td>${buildSelect(attr8Values, i.attr8 || '', `onAttrChange(${index}, 8, this.value)`)}</td>
        <td>${buildSelect(attr9Values, i.attr9 || '', `onAttrChange(${index}, 9, this.value)`)}</td>
        <td>${attrHtml}</td>
        <td>
          <input type="number" min="1" value="${i.quantity}" 
                 onchange="updateQuantity(${index}, this.value)" 
                 style="width:70px; text-align:center;">
        </td>
        <td>${i.costPrice ?? 0}</td>
        <td>${i.sellingPrice ?? 0}</td>
        <td class="action-col">
          <div class="action-buttons">
            <button class="duplicate-btn" onclick="duplicateItem(${index})">Duplikovat</button>
            <button class="remove-btn" onclick="removeItem(${index})">Odebrat</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

  } catch (e) {
    errorEl.textContent = 'Chyba při načítání nabídky: ' + e.message;
  }
}

function updateQuantity(index, value) {
  const it = window._quoteItems[index];
  if (it) it.quantity = parseInt(value) || 1;
}

function duplicateItem(index) {
  const original = window._quoteItems[index];
  if (!original) return;

  const duplicate = JSON.parse(JSON.stringify(original));
  duplicate.quantity = 1;

  window._quoteItems.splice(index + 1, 0, duplicate);

  const tbody = document.getElementById('items');
  const newRow = tbody.insertRow(index + 1);

  let attrHtml = '<div class="attr-list">';
  for (let n = 1; n <= 7; n++) {
    const val = duplicate.attributes?.[`attr${n}`];
    if (val) {
      attrHtml += `<div class="attr-item">Attr${n}: ${escapeHtml(val)}</div>`;
    }
  }
  attrHtml += '</div>';

  const rowIndex = index + 1;

  newRow.innerHTML = `
    <td class="pohoda-col">
      <div class="pohoda-buttons">
        <button onclick="onCheckPohoda(${rowIndex})">CHECK POHODA</button>
        <span id="pohoda-result-${rowIndex}" class="small" style="margin-top:3px;"></span>
      </div>
    </td>
    <td>${escapeHtml(duplicate.code ?? '')}</td>
    <td>${buildSelect(attr8Values, duplicate.attr8 || '', `onAttrChange(${rowIndex}, 8, this.value)`)}</td>
    <td>${buildSelect(attr9Values, duplicate.attr9 || '', `onAttrChange(${rowIndex}, 9, this.value)`)}</td>
    <td>${attrHtml}</td>
    <td>
      <input type="number" min="1" value="${duplicate.quantity}" 
             onchange="updateQuantity(${rowIndex}, this.value)" 
             style="width:70px; text-align:center;">
    </td>
    <td>${duplicate.costPrice ?? 0}</td>
    <td>${duplicate.sellingPrice ?? 0}</td>
    <td class="action-col">
      <div class="action-buttons">
        <button class="duplicate-btn" onclick="duplicateItem(${rowIndex})">Duplikovat</button>
        <button class="remove-btn" onclick="removeItem(${rowIndex})">Odebrat</button>
      </div>
    </td>
  `;
}

function removeItem(index) {
  if (!confirm('Odebrat tento řádek?')) return;
  window._quoteItems.splice(index, 1);
  document.querySelectorAll('#items tr')[index].remove();

  document.querySelectorAll('#items tr').forEach((row, newIdx) => {
    row.querySelector('button[onclick^="duplicateItem"]').onclick = () => duplicateItem(newIdx);
    row.querySelector('button[onclick^="removeItem"]').onclick = () => removeItem(newIdx);
    row.querySelector('input[type="number"]').onchange = (e) => updateQuantity(newIdx, e.target.value);
  });
}

async function createPohodaOrder() {
  if (window._quoteItems.length === 0) {
    alert('Nabídka nemá žádné položky – nelze vytvořit objednávku.');
    return;
  }

  if (!confirm('Opravdu chcete vytvořit prodejní objednávku v Pohodě na základě aktuální nabídky?')) {
    return;
  }

  const statusEl = document.getElementById('error');
  statusEl.textContent = 'Připravuji objednávku do Pohody...';
  statusEl.style.color = '#007bff';
  statusEl.style.background = '#e2f0ff';

  const orderItems = [];

  for (const it of window._quoteItems) {
    let finalCode = it.code || '';

    const itemId = it.itemId;
    const attr8 = (it.attr8 || '').trim();
    const attr9 = (it.attr9 || '').trim();

    if (itemId && attr8 && attr9) {
      try {
        const r = await findIdsByAttrs(itemId, attr8, attr9);
        if (r.ids && r.ids.trim() !== '') {
          finalCode = r.ids.trim();
        }
      } catch (e) {
        console.warn(`Chyba při hledání varianty: ${e.message}`);
      }
    }

    orderItems.push({
      Code: finalCode,
      Name: '',
      Attr1: it.attributes?.attr1 || null,
      Attr2: it.attributes?.attr2 || null,
      Attr3: it.attributes?.attr3 || null,
      Attr4: it.attributes?.attr4 || null,
      Attr5: it.attributes?.attr5 || null,
      Attr6: it.attributes?.attr6 || null,
      Attr7: it.attributes?.attr7 || null,
      Quantity: it.quantity || 1,
      SellingPrice: it.sellingPrice || 0
    });
  }

  const orderData = {
    quoteNumber: getQuoteFromInput(),
    customerId: '',
    customerName: document.getElementById('customerName').value || '',
    date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
    items: orderItems
  };

  try {
    const res = await fetch(`${API_BASE}/OrderCreationInPohoda`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }

    const result = await res.json();

    statusEl.innerHTML = `✓ Objednávka vytvořena!<br>Číslo: <strong>${result.orderNumber || 'neznámé'}</strong>`;
    statusEl.style.color = '#28a745';
    statusEl.style.background = '#d4edda';

    alert(`Prodejní objednávka úspěšně vytvořena jako ${result.orderNumber || 'nová objednávka'}`);

  } catch (e) {
    console.error('Chyba při vytváření objednávky:', e);
    statusEl.textContent = 'Chyba při vytváření objednávky: ' + e.message;
    statusEl.style.color = '#dc3545';
    statusEl.style.background = '#f8d7da';
  }
}

window.onload = async () => {
  const cfg = await fetch('/api/config').then(r => r.json());
  API_BASE = cfg.apiBase;

  await loadAvailableQuotes(true);
  await ensureAttrLoaded();

  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('quote');
  if (fromUrl) {
    document.getElementById('quoteNumber').value = fromUrl;
    await loadQuote();
  }
};
</script>
